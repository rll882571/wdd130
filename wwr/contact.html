<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact Rapid Rush Rafting for reservations, questions, or suggestions.">

    <meta name="author" content="Rodrigo Ferreira de Lima">

    <link rel="stylesheet" href="styles/rafting.css">

    <title>Contact Us | Rapid Rush Rafting</title>
</head>

<body>

    <header>

        <img src="images/logo.jpeg" alt="Rafting company logo" width="80">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <h1 class="contact-h1">Rapid Rush Rafting</h1>

        <section class="contact-info">

            <h2>Company Information</h2>

            <p><strong>Address:</strong> 444 Fortaleza City, CE 60442-132</p>

            <p><strong>Phone:</strong> +55 (85) 1234-5678</p>

            <p><strong>Email:</strong> info@rapidrushrafting.com</p>

        </section>


        <section class="contact-team">

            <h2>We are here to serve you</h2>

            <div class="team-grid">

                <figure>
                    <img src="images/neymar.jpg" alt="Customer service manager">
                    <figcaption>Mila Johnson – Operations Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/marta.jpg" alt="Reservation specialist">
                    <figcaption>Marta Silva – Reservation Specialist</figcaption>
                </figure>

                <figure>
                    <img src="images/mila.jpg" alt="Operations coordinator">
                    <figcaption>Neymar – Customer Service Manager</figcaption>
                </figure>
            </div>
        </section>

        <div class="contact-layout">

            <section class="contact-map">

                <iframe src="https://www.google.com/maps?q=Fortaleza+CE&output=embed" width="400"
                  height="430" loading="lazy"> </iframe>

            </section>


            <section class="contact-form">


                <form>

                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name"
                      required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email"
                      required>

                    <p>Purpose of your message:</p>

                    <label>
                        <input type="radio" name="purpose" value="general" id="inquiry" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation" id="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion" id="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message" id="me">Message</label>

                    <textarea id="message" name="message" rows="4" placeholder="type here"
                      required></textarea>

                    <label>
                        <input type="checkbox" name="newsletter">
                        Please Subscribe me to the monthyly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>

                </form>

            </section>
        </div>

    </main>

    <footer>

        <p>&copy; 2026 Rapid Rush Rafting - Rodrigo</p>

        <nav class="socialmedia">

            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>

            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin_725337.png" alt="LinkedIn Icon">
            </a>

            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram_1384063.png" alt="Instagram Icon">
            </a>

        </nav>

    </footer>

</body>

</html>
